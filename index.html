<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOURING PRO - PHAN THIẾT</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #ff4b2b; --dark: #121212; --card: #1e1e1e; --accent: #00ff00; --off: #555; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        header { background: #000; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); font-weight: 900; }
        .power-btn { padding: 5px 15px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-on { background: var(--accent); color: black; box-shadow: 0 0 10px var(--accent); }
        .btn-off { background: var(--off); color: white; }
        
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); width: 85%; max-width: 320px; text-align: center; }
        .login-input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; text-align: center; font-size: 20px; outline: none; }
        
        .tabs { display: flex; background: #111; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #888; font-weight: bold; font-size: 11px; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        
        .content { flex: 1; display: none; position: relative; overflow-y: auto; }
        .content.active { display: block; }
        
        .radio-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .ptt-btn { width: 160px; height: 160px; border-radius: 50%; background: var(--primary); border: 8px solid #333; color: white; font-weight: bold; font-size: 18px; margin-bottom: 20px; transition: 0.2s; }
        .ptt-btn.speaking { background: var(--accent); box-shadow: 0 0 40px var(--accent); color: black; transform: scale(1.05); }
        
        .test-mic-container { width: 80%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; margin-top: 10px; border: 1px solid #444; }
        #mic-level-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff4b2b, #00ff00); transition: width 0.1s; }
        
        #map { height: 100%; width: 100%; }
        .setting-item { padding: 20px; border-bottom: 1px solid #333; }
        .setting-label { display: block; font-weight: bold; margin-bottom: 10px; color: var(--primary); }
        
        #off-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color: var(--primary)">TOURING 2026</h2>
        <input type="number" id="loginCode" class="login-input" placeholder="Mã: 1, 2, 3">
        <button style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold;" onclick="checkLogin()">VÀO ĐOÀN</button>
    </div>
</div>

<div id="app-interface" style="display: none; flex-direction: column; height: 100vh;">
    <header>
        <span id="userNameDisplay">KHANG</span>
        <button id="mainPowerBtn" class="power-btn btn-on" onclick="togglePower()">HỆ THỐNG: ON</button>
    </header>

    <div id="off-overlay">
        <h2 style="color: red;">ĐÃ TẮT KẾT NỐI</h2>
        <p>Vui lòng bật ON để nghe/nói bộ đàm</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('radio', this)">BỘ ĐÀM</button>
        <button class="tab-btn" onclick="switchTab('map-tab', this)">BẢN ĐỒ</button>
        <button class="tab-btn" onclick="switchTab('music', this)">NHẠC</button>
        <button class="tab-btn" onclick="switchTab('settings', this)">LOA</button>
    </div>

    <div id="radio" class="content active">
        <div class="radio-screen">
            <div id="voxStatus" style="color:var(--accent); font-size:12px; margin-bottom:10px; letter-spacing: 1px;">● TRỰC TUYẾN</div>
            <button id="pttBtn" class="ptt-btn">NHẤN NÓI</button>
            <span style="font-size: 10px; color: #888; margin-bottom: 5px;">TÍN HIỆU MIC TAI NGHE:</span>
            <div class="test-mic-container"><div id="mic-level-bar"></div></div>
        </div>
    </div>

    <div id="map-tab" class="content"><div id="map"></div></div>
    
    <div id="music" class="content">
        <iframe src="https://open.spotify.com/embed/playlist/1XjB146nS6eUAnGz2pUunP?utm_source=generator&theme=0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <div id="settings" class="content">
        <div class="setting-item">
            <span class="setting-label">Ưu tiên tiếng nói (Khuếch đại)</span>
            <input type="range" id="gainVol" min="1" max="10" value="3" step="0.5" oninput="updateGain(this.value)" style="width:100%">
            <p style="font-size: 11px; color: #888;">Kéo tăng nếu tiếng anh em bị nhạc đè nhỏ.</p>
        </div>
        <div class="setting-item">
            <span class="setting-label">Độ nhạy VOX (Tự động nói)</span>
            <input type="range" id="voxSense" min="5" max="60" value="20" style="width:100%">
            <p style="font-size: 11px; color: #888;">Để mức thấp (15-20) khi dùng tai nghe Bluetooth.</p>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const users = {"1":"KHANG","2":"HUY","3":"LONG"};
    let currentUser = null, map, isAppOn = true;
    let audioCtx, gainNode, analyser, audioStream;

    function checkLogin() {
        const code = document.getElementById('loginCode').value;
        if (users[code]) {
            currentUser = users[code];
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-interface').style.display = 'flex';
            document.getElementById('userNameDisplay').innerText = currentUser;
            initApp();
        } else { alert("Mã đoàn không đúng!"); }
    }

    function togglePower() {
        isAppOn = !isAppOn;
        document.getElementById('mainPowerBtn').innerText = isAppOn ? "HỆ THỐNG: ON" : "HỆ THỐNG: OFF";
        document.getElementById('mainPowerBtn').className = isAppOn ? "power-btn btn-on" : "power-btn btn-off";
        document.getElementById('off-overlay').style.display = isAppOn ? "none" : "flex";
    }

    async function initApp() {
        // Khởi tạo bản đồ Phan Thiết
        map = L.map('map').setView([10.9333, 108.1000], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{y}.png').addTo(map);
        L.marker([10.9333, 108.1000]).addTo(map).bindPopup("Bạn đang ở đây").openPopup();

        // Khởi tạo hệ thống âm thanh (VOX + Gain)
        try {
            audioStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
            });
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(audioStream);
            
            gainNode = audioCtx.createGain();
            gainNode.gain.value = 3.0; // Mặc định khuếch đại x3
            
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            
            source.connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(audioCtx.destination);

            const buffer = new Uint8Array(analyser.frequencyBinCount);
            let isDucking = false;

            function processAudio() {
                if (!isAppOn) { requestAnimationFrame(processAudio); return; }
                
                analyser.getByteFrequencyData(buffer);
                const avg = buffer.reduce((a, b) => a + b) / buffer.length;
                
                // Cập nhật thanh sóng mic
                document.getElementById('mic-level-bar').style.width = Math.min(avg * 2.5, 100) + "%";

                const threshold = document.getElementById('voxSense').value;
                const btn = document.getElementById('pttBtn');

                if (avg > threshold) {
                    btn.classList.add('speaking');
                    btn.innerText = "ĐANG NÓI...";
                    if(!isDucking) {
                        gainNode.gain.setTargetAtTime(6.0, audioCtx.currentTime, 0.1); // Đẩy tiếng nói cực to để đè nhạc
                        isDucking = true;
                    }
                } else {
                    btn.classList.remove('speaking');
                    btn.innerText = "NHẤN NÓI";
                    if(isDucking) {
                        gainNode.gain.setTargetAtTime(3.0, audioCtx.currentTime, 0.5); // Trả về mức thường
                        isDucking = false;
                    }
                }
                requestAnimationFrame(processAudio);
            }
            processAudio();
        } catch (err) {
            console.log("Mic error: ", err);
            alert("Vui lòng cấp quyền Microphone để dùng bộ đàm!");
        }
    }

    function updateGain(val) {
        if(gainNode) gainNode.gain.value = val;
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'map-tab' && map) setTimeout(() => map.invalidateSize(), 200);
    }
</script>

</body>
</html>
